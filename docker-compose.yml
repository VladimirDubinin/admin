services:
  nginx:
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME}.nginx
    build:
      context: ./.docker/nginx
      target: nginx_dev
    depends_on:
      - php-fpm
    ports:
      - '${NGINX_HTTP_PORT:-}:80'
      - '${NGINX_HTTPS_PORT:-}:443'
    volumes:
      - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  php-fpm:
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME}.php-fpm
    build:
      context: .docker/php-fpm
      target: php_dev
    volumes:
        - .:/app
    depends_on:
      - mariadb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mariadb:
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME}.mariadb
    image: 'mariadb:11'
    ports:
      - '${FORWARD_DB_PORT:-}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-rootpassword}'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: '${DB_DATABASE:-dbname}'
      MYSQL_USER: '${DB_USERNAME:-dbuser}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - './.docker/mariadb/data:/var/lib/mysql'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: 'redis:alpine'
    container_name: ${COMPOSE_PROJECT_NAME}.redis
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - './.docker/redis:/data'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s

  meilisearch:
    image: 'getmeili/meilisearch:latest'
    container_name: ${COMPOSE_PROJECT_NAME}.meilisearch
    ports:
      - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    environment:
      MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
      MEILI_MASTER_KEY: '${MEILISEARCH_KEY}'
    volumes:
      - './.docker/meilisearch:/meili_data'
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--spider'
        - 'http://127.0.0.1:7700/health'
      retries: 3
      timeout: 5s

  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: ${COMPOSE_PROJECT_NAME}.mailpit
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'

  queue-worker:
    build:
      context: .docker/php-fpm
    container_name: ${COMPOSE_PROJECT_NAME}.queue-worker
    depends_on:
      - redis
      - mariadb
    volumes:
      - .:/app
    command: php /app/artisan queue:work --verbose --tries=3 --timeout=90
    restart: unless-stopped
    labels:
      ofelia.enabled: "false"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_network:
